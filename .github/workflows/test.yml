name: test

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        frida-version: ["16.6.6", "17.7.3"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Frida for CI
        run: python -m pip install frida==${{ matrix.frida-version }}

      - name: Install package
        run: python -m pip install -e .

      - name: Compile
        run: python -m compileall -q src/noxen

      - name: Test
        run: python -m unittest discover -s tests
